services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tetapi
      POSTGRES_USER: tetapi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tetapi"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql+asyncpg://tetapi:${POSTGRES_PASSWORD}@postgres:5432/tetapi
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      CORS_ORIGINS: '["https://tetapi.dev","https://app.tetapi.dev","https://mcp.tetapi.dev"]'
      UK_COMPANIES_HOUSE_API_KEY: ${UK_COMPANIES_HOUSE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  worker:
    build: ./api
    environment:
      DATABASE_URL: postgresql+asyncpg://tetapi:${POSTGRES_PASSWORD}@postgres:5432/tetapi
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=warning -c 4

  web:
    build: ./web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.tetapi.dev
      NEXT_PUBLIC_LANDING_URL: https://tetapi.dev
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command: npm start

  mcp:
    build: ./mcp
    environment:
      TETA_PI_API_URL: http://api:8000/api/v1
      MCP_PORT: "3002"
    ports:
      - "127.0.0.1:3002:3002"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
