<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#1A1035"/>
  <!-- grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- left glow -->
  <radialGradient id="g1" cx="20%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#6B3FA0" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#6B3FA0" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <!-- right glow -->
  <radialGradient id="g2" cx="80%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#E8640C" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#E8640C" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <!-- logo -->
  <text x="80" y="100" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="#6B3FA0">Θ</text>
  <text x="130" y="100" font-family="Georgia,serif" font-size="36" font-weight="300" fill="rgba(255,255,255,0.4)">+</text>
  <text x="155" y="100" font-family="Georgia,serif" font-size="48" font-weight="bold" fill="#E8640C">π</text>
  <!-- main headline -->
  <text x="80" y="220" font-family="'Trebuchet MS',sans-serif" font-size="58" font-weight="700" letter-spacing="-1" fill="#ffffff">Be found by AI agents.</text>
  <text x="80" y="295" font-family="'Trebuchet MS',sans-serif" font-size="58" font-weight="700" letter-spacing="-1" fill="#ffffff">Get verified on TETA+PI.</text>
  <!-- subtitle -->
  <text x="80" y="370" font-family="'Trebuchet MS',sans-serif" font-size="26" fill="rgba(201,184,232,0.75)">Verified entities are visible in agent search.</text>
  <text x="80" y="408" font-family="'Trebuchet MS',sans-serif" font-size="26" fill="rgba(201,184,232,0.75)">Unverified ones don't exist in Agent Internet.</text>
  <!-- chips -->
  <rect x="80" y="468" width="200" height="38" rx="4" fill="rgba(107,63,160,0.3)" stroke="rgba(107,63,160,0.5)" stroke-width="1"/>
  <text x="180" y="492" text-anchor="middle" font-family="monospace" font-size="14" fill="#C9B8E8">registry:attested</text>
  <rect x="296" y="468" width="185" height="38" rx="4" fill="rgba(107,63,160,0.3)" stroke="rgba(107,63,160,0.5)" stroke-width="1"/>
  <text x="388" y="492" text-anchor="middle" font-family="monospace" font-size="14" fill="#C9B8E8">c2pa:verified</text>
  <rect x="497" y="468" width="188" height="38" rx="4" fill="rgba(107,63,160,0.3)" stroke="rgba(107,63,160,0.5)" stroke-width="1"/>
  <text x="591" y="492" text-anchor="middle" font-family="monospace" font-size="14" fill="#C9B8E8">btc:confirmed</text>
  <!-- right side code block -->
  <rect x="800" y="160" width="320" height="290" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="820" y="195" font-family="monospace" font-size="13" fill="rgba(144,136,176,0.6)">teta_search({</text>
  <text x="820" y="220" font-family="monospace" font-size="13" fill="rgba(144,136,176,0.6)">  query: "organic DE",</text>
  <text x="820" y="245" font-family="monospace" font-size="13" fill="rgba(144,136,176,0.6)">  level: "full"</text>
  <text x="820" y="270" font-family="monospace" font-size="13" fill="rgba(144,136,176,0.6)">})</text>
  <text x="820" y="310" font-family="monospace" font-size="13" fill="#4ADE80">→ GreenFarm GmbH</text>
  <text x="820" y="335" font-family="monospace" font-size="13" fill="rgba(201,184,232,0.5)">  registry: DE-ÖKO-006</text>
  <text x="820" y="360" font-family="monospace" font-size="13" fill="rgba(201,184,232,0.5)">  c2pa: ✓ signed</text>
  <text x="820" y="385" font-family="monospace" font-size="13" fill="rgba(201,184,232,0.5)">  btc:  confirmed</text>
  <text x="820" y="415" font-family="monospace" font-size="13" fill="#E8640C">  trust: FULL</text>
  <!-- domain -->
  <text x="80" y="590" font-family="monospace" font-size="18" fill="rgba(144,136,176,0.5)">tetapi.dev</text>
</svg>
