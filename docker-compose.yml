services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tetapi
      POSTGRES_USER: tetapi
      POSTGRES_PASSWORD: tetapi_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tetapi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql+asyncpg://tetapi:tetapi_dev@postgres:5432/tetapi
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./api
    environment:
      DATABASE_URL: postgresql+asyncpg://tetapi:tetapi_dev@postgres:5432/tetapi
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info

  web:
    build: ./web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3001:3001"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  mcp:
    image: node:22-alpine
    working_dir: /app
    environment:
      TETA_PI_API_URL: http://api:8000/api/v1
      MCP_PORT: "3002"
    ports:
      - "3002:3002"
    volumes:
      - ./mcp:/app
      - /app/node_modules
    depends_on:
      - api
    command: npx tsx src/index.ts

volumes:
  postgres_data:
