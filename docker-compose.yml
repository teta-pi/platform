services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tetapi
      POSTGRES_USER: tetapi
      POSTGRES_PASSWORD: tetapi_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tetapi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── API (FastAPI + Alembic migrations on startup) ──────────────────────────

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql+asyncpg://tetapi:tetapi_dev@postgres:5432/tetapi
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Celery worker ──────────────────────────────────────────────────────────

  worker:
    build: ./api
    environment:
      DATABASE_URL: postgresql+asyncpg://tetapi:tetapi_dev@postgres:5432/tetapi
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
    volumes:
      - ./api:/app
    depends_on:
      api:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info -c 2

  # ── Landing page (static HTML) on :3000 ────────────────────────────────────

  landing:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./landing:/usr/share/nginx/html:ro
      - ./landing/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Override config.js with dev version (points to localhost:3001)
      - ./landing/config.dev.js:/usr/share/nginx/html/config.js:ro

  # ── Web app (Next.js) on :3001 ────────────────────────────────────────────

  web:
    build: ./web
    environment:
      PORT: "3001"
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_LANDING_URL: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    depends_on:
      api:
        condition: service_healthy
    command: npm run dev

  # ── MCP server on :3002 ────────────────────────────────────────────────────

  mcp:
    build: ./mcp
    environment:
      TETA_PI_API_URL: http://api:8000/api/v1
      MCP_PORT: "3002"
    ports:
      - "3002:3002"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  web_node_modules:
  web_next:
